name: 'Print backend hashes'

on: [workflow_dispatch]

permissions:
  contents: read

jobs:
  print-backend-sha:
    runs-on: mempool-ci
    name: Print backend hashes
    steps:
      - name: Checkout
        uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3
        with:
          path: repo

      - name: Run script
        working-directory: repo
        run: |
          chmod +x ./scripts/get_backend_hash.sh
          sh ./scripts/get_backend_hash.sh
