name: 'Print backend hashes'

on: [workflow_dispatch]

permissions:
  contents: read

jobs:
  print-backend-sha:
    runs-on: mempool-ci
    name: Print backend hashes
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          path: repo

      - name: Run script
        working-directory: repo
        run: |
          chmod +x ./scripts/get_backend_hash.sh
          sh ./scripts/get_backend_hash.sh
