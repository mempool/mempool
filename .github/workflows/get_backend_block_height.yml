name: 'Check if servers are in sync'

on: [workflow_dispatch]

permissions:
  contents: read

jobs:
  print-backend-sha:
    runs-on: mempool-ci
    name: Get block height
    steps:
      - name: Checkout
        uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3
        with:
          path: repo

      - name: Run script
        working-directory: repo
        run: |
          chmod +x ./scripts/get_block_tip_height.sh
          sh ./scripts/get_block_tip_height.sh
