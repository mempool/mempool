<ng-container *ngIf="{ cost: costToSpend$ | async } as state">
  <div class="box" *ngIf="state.cost as cost; else notReady">
    <div class="row align-items-start">
      <div class="col-md">
        <div
          class="text-muted small text-uppercase mb-1"
          i18n="address.cost-to-spend.parameters|Cost to spend parameters group"
        >
          Parameters
        </div>
        <table class="table table-borderless table-striped cost-to-spend-table">
          <tbody>
            <tr>
              <td i18n="address.cost-to-spend.input-vsize">vsize per input</td>
              <td class="wrap-cell">
                <span
                  *ngIf="cost.estimated"
                  class="estimate-marker"
                  i18n-ngbTooltip="address.cost-to-spend.estimated-tooltip"
                  ngbTooltip="Estimated for this script type; actual size varies"
                  placement="bottom"
                  >~</span
                >{{ cost.inputVsize | number }} <span class="symbol">vB</span>
              </td>
            </tr>
            <tr>
              <td i18n="address.cost-to-spend.utxos">Spendable UTXOs</td>
              <td class="wrap-cell">{{ utxoCount | number }}</td>
            </tr>
            <tr>
              <td i18n="address.cost-to-spend.fee-rate">Fee rate (~30 min)</td>
              <td class="wrap-cell">
                <app-fee-rate [fee]="cost.feeRate"></app-fee-rate>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="col-md">
        <div
          class="text-muted small text-uppercase mb-1"
          i18n="address.cost-to-spend.group-cost|Cost to spend group header"
        >
          Cost to spend
        </div>
        <table
          class="table table-borderless table-striped cost-to-spend-table mb-3"
        >
          <tbody>
            <tr>
              <td
                i18n-ngbTooltip="address.cost-to-spend.min-cost-tooltip"
                ngbTooltip="Best case: all UTXOs consolidated into a single transaction, so the per-transaction overhead is shared"
                placement="bottom"
              >
                <span i18n="address.cost-to-spend.min-cost"
                  >Spend all together</span
                >
              </td>
              <td class="wrap-cell">
                <app-amount
                  [satoshis]="cost.minCost"
                  [noFiat]="true"
                ></app-amount>
                <span class="fiat"
                  ><app-fiat [value]="cost.minCost"></app-fiat
                ></span>
              </td>
            </tr>
            <tr>
              <td
                i18n-ngbTooltip="address.cost-to-spend.max-cost-tooltip"
                ngbTooltip="Worst case: each UTXO is spent separately, each in its own transaction with one typical output, so every spend pays full overhead"
                placement="bottom"
              >
                <span i18n="address.cost-to-spend.max-cost"
                  >Spend separately</span
                >
              </td>
              <td class="wrap-cell">
                <app-amount
                  [satoshis]="cost.maxCost"
                  [noFiat]="true"
                ></app-amount>
                <span class="fiat"
                  ><app-fiat [value]="cost.maxCost"></app-fiat
                ></span>
              </td>
            </tr>
          </tbody>
        </table>
        <div
          class="text-muted small text-uppercase mb-1"
          i18n="
            address.cost-to-spend.group-effective-balance|Effective balance
            group header
          "
        >
          Effective balance
        </div>
        <table class="table table-borderless table-striped cost-to-spend-table">
          <tbody>
            <tr>
              <td
                i18n-ngbTooltip="
                  address.cost-to-spend.min-effective-balance-tooltip
                "
                ngbTooltip="Balance minus the maximum cost to spend (each UTXO spent separately)"
                placement="bottom"
              >
                <span i18n="address.cost-to-spend.min-effective-balance"
                  >Min effective balance</span
                >
              </td>
              <td class="wrap-cell">
                <app-amount
                  [satoshis]="cost.minEffectiveBalance"
                  [noFiat]="true"
                ></app-amount>
                <span class="fiat"
                  ><app-fiat [value]="cost.minEffectiveBalance"></app-fiat
                ></span>
              </td>
            </tr>
            <tr>
              <td
                i18n-ngbTooltip="
                  address.cost-to-spend.max-effective-balance-tooltip
                "
                ngbTooltip="Balance minus the minimum cost to spend (all UTXOs consolidated)"
                placement="bottom"
              >
                <span i18n="address.cost-to-spend.max-effective-balance"
                  >Max effective balance</span
                >
              </td>
              <td class="wrap-cell">
                <app-amount
                  [satoshis]="cost.maxEffectiveBalance"
                  [noFiat]="true"
                ></app-amount>
                <span class="fiat"
                  ><app-fiat [value]="cost.maxEffectiveBalance"></app-fiat
                ></span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <ng-template #notReady>
    <ng-container *ngIf="state.cost === null; else loading">
      <div class="box">
        <div class="text-center" i18n="address.cost-to-spend.unavailable">
          Fee data unavailable
        </div>
      </div>
    </ng-container>
    <ng-template #loading>
      <div class="box">
        <div class="row">
          <div class="col-md" *ngFor="let col of [1, 2]">
            <table
              class="table table-borderless table-striped cost-to-spend-table"
            >
              <tbody>
                <tr *ngFor="let i of [1, 2, 3, 4]">
                  <td colspan="2"><span class="skeleton-loader"></span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </ng-template>
  </ng-template>
</ng-container>
